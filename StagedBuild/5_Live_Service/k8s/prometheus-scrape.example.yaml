# Example static scrape config for Prometheus (non-Operator setups).
# Add this job to prometheus.yml, or use the pod annotations already on the Deployment.
#
# Cortex ingests these series when Prometheus remote_writes or federates to it.
#
scrape_configs:
  - job_name: btc-regime-detector
    scrape_interval: 60s
    scrape_timeout: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - btc-regime-detector.default.svc.cluster.local:9109
        labels:
          service: btc-regime-detector
